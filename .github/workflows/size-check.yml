name: Bundle Size Check

on:
  pull_request:
    branches: [main]

jobs:
  size:
    name: Compare bundle size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build PR branch
        run: bun run build
        env:
          NODE_ENV: production

      - name: Measure PR bundle
        id: pr_size
        run: |
          SIZE=$(du -sb render/dist 2>/dev/null | cut -f1 || echo 0)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Build base branch
        run: |
          git stash
          git checkout ${{ github.base_ref }}
          bun install --frozen-lockfile
          bun run build
        env:
          NODE_ENV: production

      - name: Measure base bundle
        id: base_size
        run: |
          SIZE=$(du -sb render/dist 2>/dev/null | cut -f1 || echo 0)
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Comment size diff
        uses: actions/github-script@v7
        with:
          script: |
            const pr   = parseInt('${{ steps.pr_size.outputs.size }}');
            const base = parseInt('${{ steps.base_size.outputs.size }}');
            const diff = pr - base;
            const pct  = base > 0 ? ((diff / base) * 100).toFixed(1) : 'N/A';
            const fmt  = (n) => (n / 1024).toFixed(1) + ' KB';
            const sign = diff >= 0 ? '+' : '';
            const emoji = Math.abs(diff) > 50000 ? (diff > 0 ? '🔴' : '🟢') : '🟡';

            const body = [
              '## Bundle Size Report ' + emoji,
              '',
              '| | Size |',
              '|---|---|',
              `| Base (\`${{ github.base_ref }}\`) | ${fmt(base)} |`,
              `| PR | ${fmt(pr)} |`,
              `| Diff | ${sign}${fmt(diff)} (${sign}${pct}%) |`,
            ].join('\n');

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.data.find(c => c.body.includes('Bundle Size Report'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
